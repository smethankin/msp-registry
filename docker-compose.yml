services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msp_password}
      POSTGRES_DB: ${POSTGRES_DB:-msp_registry}
    volumes:
      - /g/msp-registry/data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msp_user} -d ${POSTGRES_DB:-msp_registry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TMPDIR: /app/uploads
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-msp_user}:${POSTGRES_PASSWORD:-msp_password}@postgres:5432/${POSTGRES_DB:-msp_registry}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-msp_user}:${POSTGRES_PASSWORD:-msp_password}@postgres:5432/${POSTGRES_DB:-msp_registry}
    ports:
      - "8000:8000"
    volumes:
      - /g/msp-registry/data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend


